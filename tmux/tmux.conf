# ============================================================
# Key Bindings Summary
# ============================================================
# Prefix: ctrl-\  (instead of default ctrl-b)
#
# Pane Management:
#   prefix + |         Split pane horizontally
#   prefix + -         Split pane vertically
#   ctrl + arrow keys  Select pane (no prefix needed)
#   prefix + arrows    Resize pane (2 cells, repeatable)
#
#
# ============================================================

set -g default-terminal "screen-256color"

# Remap prefix key to ctrl-\ instead of ctrl-b
unbind-key C-b
set -g prefix 'C-\'
bind-key 'C-\' send-prefix

# Map | and - to split panes
bind | split-window -h
bind - split-window -v

# Allow scrolling with mouse
set-option -g mouse on

# Enable vi keys in tmux
set-window-option -g mode-keys vi

# Tmux session is always open so limit history
set-option -g history-limit 10000

# Remove escape key delay for vim
set -sg escape-time 0

# The "Spotlight" Effect:
# Active pane stays pure black, inactive panes turn a very dark grey
set -g window-active-style 'fg=terminal,bg=black'
set -g window-style 'fg=colour247,bg=colour234'

set -g pane-active-border-style 'fg=#bd93f9,bg=default'
set -g pane-border-style fg=colour236,bg=default

# Pane border status
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#bd93f9], #[fg=colour245]}[ Pane: #P | Path: #{pane_current_path} ] "
set -g status-interval 1

# Resize panes with prefix + arrow keys (2 cells at a time)
bind -r Left resize-pane -L 2
bind -r Down resize-pane -D 2
bind -r Up resize-pane -U 2
bind -r Right resize-pane -R 2

# Select panes with ctrl + arrow keys (no prefix needed)
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Status bar - highlight active window
set -g status-style 'bg=colour235,fg=colour247'
set -g window-status-current-style 'bg=colour51,fg=colour0,bold'
set -g window-status-current-format ' #I:#W '
set -g window-status-format ' #I:#W '

# Copy mouse selection to system clipboard via pbcopy without leaving copy mode
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"

# TPM (Tmux Plugin Manager)
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then reload config and press prefix + I to install (new) plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'dracula/tmux'

# Dracula theme settings
set -g @dracula-plugins "git time weather"
set -g @dracula-show-timezone false
set -g @dracula-military-time false
set -g @dracula-border-contrast true

run '~/.tmux/plugins/tpm/tpm'
