# ============================================================
# Key Bindings Summary
# ============================================================
# Prefix: ctrl-\  (instead of default ctrl-b)
#
# Pane Management:
#   prefix + |         Split pane horizontally
#   prefix + -         Split pane vertically
#   ctrl + arrow keys  Select pane (no prefix needed)
#   prefix + arrows    Resize pane (2 cells, repeatable)
#
#
# ============================================================

set -g default-terminal "screen-256color"

# Remap prefix key to ctrl-\ instead of ctrl-b
unbind-key C-b
set -g prefix 'C-\'
bind-key 'C-\' send-prefix

# Map | and - to split panes
bind | split-window -h
bind - split-window -v

# Allow scrolling with mouse
set-option -g mouse on

# Enable vi keys in tmux
set-window-option -g mode-keys vi

# Tmux session is always open so limit history
set-option -g history-limit 10000

# Remove escape key delay for vim
set -sg escape-time 0

# Colors:
# https://upload.wikimedia.org/wikipedia/commons/1/15/Xterm_256color_chart.svg
# Set inactive/active window styles
set -g window-style 'fg=colour247,bg=colour234'
set -g window-active-style 'fg=colour250,bg=black'

# Pane border
set -g pane-border-style 'fg=colour235,bg=colour238'
set -g pane-active-border-style 'fg=colour51,bg=colour236'

# Resize panes with prefix + arrow keys (2 cells at a time)
bind -r Left resize-pane -L 2
bind -r Down resize-pane -D 2
bind -r Up resize-pane -U 2
bind -r Right resize-pane -R 2

# Select panes with ctrl + arrow keys (no prefix needed)
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Copy mouse selection to system clipboard via pbcopy without leaving copy mode
set -g set-clipboard on
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"
